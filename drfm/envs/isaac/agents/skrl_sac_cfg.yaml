seed: 1

models:
  policy:
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    network:
      - layers: [256, 256, 256]
        activations: elu
  critic:
    clip_actions: False
    network:
      - layers: [256, 256, 256]
        activations: elu

agent:
  memory_size: 10000
  batch_size: 256
  gradient_steps: 1
  discount_factor: 0.99
  polyak: 0.005
  actor_learning_rate: 3.0e-04
  critic_learning_rate: 3.0e-04
  entropy_learning_rate: 3.0e-04
  initial_entropy_value: 0.2
  target_entropy: null
  learn_entropy: True
  random_timesteps: 1000
  learning_starts: 1000
  grad_norm_clip: 1.0
  experiment:
    directory: "drone_recon"
    experiment_name: ""
    write_interval: 1000
    checkpoint_interval: 0

trainer:
  timesteps: 50000
  environment_info: log
